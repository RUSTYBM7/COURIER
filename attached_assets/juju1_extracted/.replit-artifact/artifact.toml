kind = "web"
previewPath = "/"
title = "Airpak Express Clone"
version = "1.0.0"
id = "artifacts/airpak-clone"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20173

[services.development]
run = "pnpm --filter @workspace/airpak-clone run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/airpak-clone", "run", "build" ]
publicDir = "artifacts/airpak-clone/site_clone/airpak-express.com"
serve = "static"

[services.env]
PORT = "20173"
BASE_PATH = "/"
