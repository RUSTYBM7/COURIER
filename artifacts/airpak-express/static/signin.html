  <style>
    :root {
      --ap-red: #CD2727;
      --ap-red-dark: #A81F1F;
      --ap-dark: #1a1a2e;
      --ap-gray: #6B7280;
    }
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--ap-dark); }
    .signin-container { display: flex; min-height: 100vh; }
    .signin-left { flex: 1; padding: 60px; display: flex; flex-direction: column; justify-content: center; background: linear-gradient(135deg, #1a1a2e 0%, #2d1f3d 100%); position: relative; overflow: hidden; }
    .signin-left::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(205,39,39,0.1) 0%, transparent 50%); animation: pulse 8s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 0.8; } }
    .signin-brand { margin-bottom: 40px; }
    .signin-brand svg { width: 48px; height: 48px; }
    .signin-headline { font-family: 'Sarabun', sans-serif; font-size: 42px; font-weight: 700; color: #fff; line-height: 1.2; margin-bottom: 20px; }
    .signin-headline span { color: var(--ap-red); }
    .signin-stats { display: flex; gap: 40px; margin-top: 50px; }
    .signin-stat { text-align: left; }
    .signin-stat-value { font-size: 36px; font-weight: 700; color: #fff; }
    .signin-stat-label { font-size: 14px; color: rgba(255,255,255,0.6); margin-top: 4px; }
    .signin-globe { position: absolute; bottom: 80px; right: -100px; width: 300px; height: 300px; opacity: 0.1; }
    .signin-right { flex: 1; padding: 60px; display: flex; flex-direction: column; justify-content: center; background: #fff; }
    .signin-form-container { max-width: 420px; margin: 0 auto; width: 100%; }
    .signin-form-title { font-family: 'Sarabun', sans-serif; font-size: 28px; font-weight: 700; color: var(--ap-dark); margin-bottom: 8px; }
    .signin-form-subtitle { color: var(--ap-gray); margin-bottom: 32px; }
    .field { margin-bottom: 20px; }
    .field-label { display: block; font-size: 14px; font-weight: 600; color: var(--ap-dark); margin-bottom: 8px; }
    .input { width: 100%; padding: 14px 16px; border: 1.5px solid #e5e7eb; border-radius: 12px; font-size: 15px; transition: all 0.2s; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    .input:focus { outline: none; border-color: var(--ap-red); box-shadow: 0 0 0 3px rgba(205,39,39,0.1); }
    .forgot-link { float: right; font-size: 13px; color: var(--ap-red); text-decoration: none; margin-top: -4px; margin-bottom: 8px; }
    .checkbox { display: flex; align-items: center; gap: 12px; margin: 24px 0; }
    .checkbox input { width: 18px; height: 18px; accent-color: var(--ap-red); }
    .checkbox label { font-size: 14px; color: var(--ap-gray); }
    .btn-primary { width: 100%; padding: 16px; background: var(--ap-red); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary:hover { background: var(--ap-red-dark); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .auth-divider { display: flex; align-items: center; margin: 28px 0; }
    .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }
    .auth-divider span { padding: 0 16px; color: var(--ap-gray); font-size: 14px; }
    .auth-social { display: flex; gap: 12px; }
    .btn-social { flex: 1; padding: 14px; border: 1.5px solid #e5e7eb; border-radius: 12px; background: #fff; cursor: pointer; font-size: 15px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s; }
    .btn-social:hover { border-color: var(--ap-red); background: #fef2f2; }
    .auth-footer { text-align: center; margin-top: 28px; color: var(--ap-gray); font-size: 14px; }
    .auth-footer a { color: var(--ap-red); font-weight: 600; text-decoration: none; }
    .nav-mini { position: fixed; top: 20px; left: 60px; z-index: 100; }
    .nav-mini a { display: flex; align-items: center; gap: 10px; color: #fff; text-decoration: none; font-weight: 600; }
    @media (max-width: 900px) { .signin-container { flex-direction: column; } .signin-left { display: none; } .signin-right { padding: 40px 24px; } }
    .logistics-overlay { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
    .lf-icon { width: 64px; height: 64px; animation: floatIcon 6s ease-in-out infinite; }
    .lf-1 { animation-delay: 0s; }
    .lf-2 { animation-delay: 1s; }
    .lf-3 { animation-delay: 2s; }
    .lf-4 { animation-delay: 3s; }
    .lf-5 { animation-delay: 4s; }
    .lf-6 { animation-delay: 5s; }
    @keyframes floatIcon {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; }
    /* Employer ID field */
    .field-row-split { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 480px) { .field-row-split { grid-template-columns: 1fr; } }

.ap-preloader{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#1a0a0a 0%,#0a0a1a 50%,#0a0505 100%);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s ease,visibility .8s ease}

.ap-preloader-dots{display:flex;gap:8px}
.ap-preloader-dot{width:8px;height:8px;background:rgba(255,255,255,.4);border-radius:50%;animation:preDot 1.2s ease-in-out infinite}
.ap-preloader-dot:nth-child(2){animation-delay:.2s}
.ap-preloader-dot:nth-child(3){animation-delay:.4s}
@keyframes preLogoPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes preBar{0%{width:0}50%{width:70%}100%{width:100%}}
@keyframes preDot{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}

  <script>
    // Mock auth state
    const MOCK_USERS = {
      google: { name: 'Alex Morgan', email: 'alex.morgan@gmail.com', company: 'Morgan Logistics Ltd', provider: 'google' },
      apple: { name: 'Alex Johnson', email: 'alex.johnson@icloud.com', company: 'Johnson Express', provider: 'apple' }
    };

    function handleSignin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('signin-btn');
      
      if (!email || !password) {
        AIRPAK.Toast.error('Please fill in all fields');
        return;
      }
      
      btn.innerHTML = '<span class="loading"></span> Signing in...';
      btn.disabled = true;
      
      setTimeout(() => {
        sessionStorage.setItem('airpak_user', JSON.stringify({ name: 'Alex Morgan', email: email, provider: 'email' }));
        AIRPAK.Toast.success('Welcome back! Redirecting...');
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      }, 800);
    }
    
    function socialLogin(provider, btn) {
      btn.innerHTML = '<span class="loading" style="border-color:rgba(0,0,0,0.2);border-top-color:#333;"></span> Connecting...';
      btn.disabled = true;
      
      setTimeout(() => {
        const user = MOCK_USERS[provider];
        sessionStorage.setItem('airpak_user', JSON.stringify(user));
        AIRPAK.Toast.success(`Signed in with ${provider === 'google' ? 'Google' : 'Apple'}!`);
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      }, 1500);
    }
  </script>
<script>
(function(){
  // Platform detection — auto-understands device
  var ua = navigator.userAgent.toLowerCase();
  var os = 'desktop';
  if (/iphone|ipad|ipod/.test(ua)) os = 'ios';
  else if (/android/.test(ua)) os = 'android';
  var w = window.innerWidth;
  if (w < 480) os += '-phone';
  else if (w < 768) os += '-tablet';
  else if (w >= 1024) os += '-desktop';
  var isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  document.body.className = [os, isDark ? 'dark' : 'light', 'loaded'].join(' ');
  // Prevent iOS Safari text inflation
  document.documentElement.style.setProperty('--text-base', '16px');
})();
</script>

<script>
// Preloader with dynamic greeting
(function(){
  var h = new Date().getHours();
  var greeting = 'Good morning';
  if (h >= 12 && h < 17) greeting = 'Good afternoon';
  else if (h >= 17 && h < 21) greeting = 'Good evening';
  else if (h >= 21) greeting = 'Good night';
  var el = document.getElementById('apPreloaderGreeting');
  if (el) el.textContent = greeting + ' — preparing your experience...';
  
  // Hide preloader once page is fully loaded
  window.addEventListener('load', function(){
    setTimeout(function(){
      var pl = document.getElementById('apPreloader');
      if (pl) pl.classList.add('hidden');
      setTimeout(function(){ if(pl) pl.style.display='none'; }, 700);
    }, 1200);
  });
})();
</script>

<script>
(function(){
  // Register service worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('/sw.js').then(function(reg) {
        console.log('[PWA] SW registered:', reg.scope);
      }).catch(function(err) {
        console.warn('[PWA] SW registration failed:', err);
      });
    });
  }

  // Install prompt
  var installPrompt = null;
  var installBtn = null;
  
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    installPrompt = e;
    window.showInstallPrompt && window.showInstallPrompt();
    
    // Auto-show after 5 seconds
    setTimeout(function() {
      if (installPrompt && !localStorage.getItem('ap_pwa_installed')) {
        var banner = document.createElement('div');
        banner.id = 'pwa-install-banner';
        banner.innerHTML = '<div style="position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,#CD2727,#9b1a1a);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;z-index:99999;box-shadow:0 -4px 20px rgba(0,0,0,.3)"><div style="flex:1"><div style="font-family:Sarabun,sans-serif;font-size:15px;font-weight:700;color:#fff;margin-bottom:2px">Install Airpak Express App</div><div style="font-size:12px;color:rgba(255,255,255,.7)">Get the full app experience — works offline!</div></div><button id="pwa-install-btn" style="background:#fff;color:#CD2727;border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;margin-left:12px;flex-shrink:0">Install</button><button onclick="this.parentElement.style.display='none'" style="background:transparent;border:none;color:rgba(255,255,255,.7);font-size:20px;cursor:pointer;padding:4px 8px;margin-left:4px">×</button></div>';
        document.body.appendChild(banner);
        
        document.getElementById('pwa-install-btn').addEventListener('click', function() {
          installPrompt.prompt();
          installPrompt.userChoice.then(function(result) {
            if (result.outcome === 'accepted') {
              localStorage.setItem('ap_pwa_installed', '1');
            }
            installPrompt = null;
            banner.style.display = 'none';
          });
        });
      }
    }, 5000);
  });

  window.addEventListener('appinstalled', function() {
    installPrompt = null;
    localStorage.setItem('ap_pwa_installed', '1');
    console.log('[PWA] App installed!');
    // Show toast
    var toast = document.createElement('div');
    toast.textContent = 'Airpak Express installed successfully!';
    toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1C1C1E;color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:500;z-index:99999;box-shadow:0 8px 32px rgba(0,0,0,.3)';
    document.body.appendChild(toast);
    setTimeout(function(){ toast.style.display='none'; }, 4000);
  });

  // Push notification subscription
  if ('Notification' in window && navigator.serviceWorker) {
    window.subscribePush = function() {
      Notification.requestPermission().then(function(perm) {
        if (perm === 'granted') {
          navigator.serviceWorker.ready.then(function(reg) {
            reg.pushManager.subscribe({
              userVisibleOnly: true,
              applicationServerKey: 'BEl62iUYgUivxIkv69yViEuiBIa-Ib9-SkvMeAtA3LFgDzkrxZJjSgSnfckjBJuBkr3M8NrXYu1Vwvfrwcsjk0s'
            }).then(function(sub) {
              console.log('[PWA] Push subscribed:', sub.endpoint);
              localStorage.setItem('ap_push_sub', JSON.stringify(sub));
            });
          });
        }
      });
    };
    
    // Auto-prompt after 10s if not subscribed
    setTimeout(function() {
      if (Notification.permission === 'default' && !localStorage.getItem('ap_push_sub')) {
        window.subscribePush && window.subscribePush();
      }
    }, 10000);
  }

  // Check online/offline status
  window.addEventListener('online', function() {
    document.body.classList.remove('offline-mode');
    console.log('[PWA] Back online');
  });
  window.addEventListener('offline', function() {
    document.body.classList.add('offline-mode');
    console.log('[PWA] Offline mode');
  });

  // Version check
  window.apVersion = '1.0.0';
})();
</script>
<script>
window.addEventListener('load', function() {
  if (typeof AirpakPWA !== 'undefined') {
    AirpakPWA.init();
  } else {
    var s = document.createElement('script');
    s.src = '/pwa-features.js';
    document.head.appendChild(s);
  }
});
</script>
