<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100">
  <defs><linearGradient id="b" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#f5f5f5"/></linearGradient><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#CD2727"/><stop offset="100%" stop-color="#9b1a1a"/></linearGradient></defs>
  <rect width="800" height="1100" fill="url(#b)"/>
  <rect x="40" y="40" width="720" height="1020" rx="20" fill="none" stroke="#CD2727" stroke-width="2"/>
  <!-- Clock face -->
  <circle cx="400" cy="400" r="180" fill="none" stroke="#CD2727" stroke-width="6"/>
  <circle cx="400" cy="400" r="165" fill="rgba(205,39,39,0.05)"/>
  <!-- Hour markers -->
  <line x1="400" y1="240" x2="400" y2="260" stroke="#CD2727" stroke-width="4"/>
  <line x1="560" y1="400" x2="540" y2="400" stroke="#CD2727" stroke-width="4"/>
  <line x1="400" y1="560" x2="400" y2="540" stroke="#CD2727" stroke-width="4"/>
  <line x1="240" y1="400" x2="260" y2="400" stroke="#CD2727" stroke-width="4"/>
  <!-- Lightning bolt -->
  <polygon points="420,180 340,420 380,420 360,540 480,300 440,300" fill="#CD2727"/>
  <!-- Hands -->
  <line x1="400" y1="400" x2="400" y2="280" stroke="#373F41" stroke-width="8" stroke-linecap="round"/>
  <line x1="400" y1="400" x2="490" y2="440" stroke="#373F41" stroke-width="6" stroke-linecap="round"/>
  <circle cx="400" cy="400" r="12" fill="#CD2727"/>
  <!-- Title -->
  <rect x="100" y="680" width="600" height="80" rx="12" fill="url(#g)"/>
  <text x="400" y="738" font-family="Arial,sans-serif" font-size="38" font-weight="bold" fill="white" text-anchor="middle">EXPRESS DELIVERY</text>
  <text x="400" y="820" font-family="Arial,sans-serif" font-size="28" fill="#373F41" text-anchor="middle">Speed meets reliability</text>
  <!-- Stats -->
  <text x="250" y="890" font-family="Arial,sans-serif" font-size="48" font-weight="900" fill="#CD2727" text-anchor="middle">24HR</text>
  <text x="400" y="890" font-family="Arial,sans-serif" font-size="48" font-weight="900" fill="#373F41" text-anchor="middle">|</text>
  <text x="550" y="890" font-family="Arial,sans-serif" font-size="48" font-weight="900" fill="#CD2727" text-anchor="middle">GLOBAL</text>
  <text x="400" y="940" font-family="Arial,sans-serif" font-size="18" fill="#999" text-anchor="middle">EXPRESS • INTERNATIONAL • DOMESTIC</text>
  <rect x="280" y="950" width="240" height="60" rx="30" fill="#CD2727"/>
  <text x="400" y="990" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">AIRPAK EXPRESS</text>
