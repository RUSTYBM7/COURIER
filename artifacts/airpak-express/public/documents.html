<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generate Documents — Airpak Express</title>
<link rel="icon" href="/apps/airpak/img/logosmall.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<link rel="stylesheet" href="/apps/airpak/css/ap-lang.css">
<link rel="stylesheet" href="/apps/airpak/css/ap-chat.css">
<style>
  *{ box-sizing:border-box; }
  body{ margin:0; font:14px/1.5 'Inter',system-ui,sans-serif; color:#1a1a24; background:#F3F4F8; }
  header{ background:#fff; border-bottom:1px solid #ececef; padding:14px 24px; display:flex; align-items:center; gap:16px; }
  header img{ height:38px; }
  header h1{ margin:0; font:800 18px 'Sarabun',sans-serif; color:#CD2727; flex:1; }
  header a{ color:#373F41; text-decoration:none; font-weight:600; font-size:13px; }
  header a:hover{ color:#CD2727; }
  .wrap{ max-width:1100px; margin:0 auto; padding:24px; display:grid; grid-template-columns:280px 1fr; gap:24px; }
  .types{ background:#fff; border-radius:12px; padding:16px; border:1px solid #ececef; height:fit-content; position:sticky; top:24px; }
  .types h3{ margin:0 0 12px; font:700 14px 'Sarabun',sans-serif; color:#373F41; text-transform:uppercase; letter-spacing:.05em; }
  .types .type-btn{ display:flex; align-items:center; gap:10px; width:100%; text-align:left; padding:11px 12px; border:1px solid #ececef; background:#fff; border-radius:10px; margin-bottom:8px; cursor:pointer; font:600 14px 'Inter',sans-serif; color:#373F41; transition:.15s; }
  .types .type-btn i{ color:#CD2727; font-size:16px; width:20px; text-align:center; }
  .types .type-btn:hover{ border-color:#CD2727; background:#fff7f7; }
  .types .type-btn.active{ background:#CD2727; color:#fff; border-color:#CD2727; }
  .types .type-btn.active i{ color:#fff; }
  .form{ background:#fff; border-radius:12px; padding:24px; border:1px solid #ececef; }
  .form h2{ margin:0 0 4px; font:800 22px 'Sarabun',sans-serif; color:#373F41; }
  .form .hint{ margin:0 0 18px; color:#6B7280; font-size:13px; }
  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .grid.full{ grid-template-columns:1fr; }
  label{ display:block; font:600 12px 'Inter',sans-serif; color:#373F41; margin-bottom:5px; text-transform:uppercase; letter-spacing:.04em; }
  input,textarea,select{ width:100%; padding:9px 11px; border:1px solid #ddd; border-radius:8px; font:14px 'Inter',sans-serif; color:#1a1a24; background:#fff; }
  input:focus,textarea:focus,select:focus{ outline:none; border-color:#CD2727; box-shadow:0 0 0 3px rgba(205,39,39,.12); }
  textarea{ resize:vertical; min-height:60px; }
  fieldset{ border:1px solid #ececef; border-radius:10px; padding:14px 16px 16px; margin:18px 0 0; }
  legend{ font:700 12px 'Inter',sans-serif; color:#CD2727; text-transform:uppercase; letter-spacing:.06em; padding:0 6px; }
  .items table{ width:100%; border-collapse:collapse; margin-top:6px; }
  .items th{ font:600 11px 'Inter',sans-serif; color:#6B7280; text-transform:uppercase; text-align:left; padding:6px 4px; border-bottom:1px solid #ececef; }
  .items td{ padding:5px 4px; }
  .items input{ padding:7px 9px; font-size:13px; }
  .items .col-desc{ width:46%; } .items .col-num{ width:12%; } .items .col-unit{ width:14%; } .items .col-act{ width:6%; text-align:center; }
  .items .rm{ background:transparent; border:0; color:#CD2727; cursor:pointer; font-size:15px; }
  .items .add{ margin-top:8px; background:transparent; border:1px dashed #CD2727; color:#CD2727; border-radius:8px; padding:7px 12px; cursor:pointer; font:600 13px 'Inter',sans-serif; }
  .actions{ margin-top:22px; display:flex; gap:12px; flex-wrap:wrap; }
  .btn{ font:700 14px 'Inter',sans-serif; padding:11px 20px; border:0; border-radius:10px; cursor:pointer; display:inline-flex; align-items:center; gap:8px; }
  .btn-primary{ background:#CD2727; color:#fff; box-shadow:0 4px 10px rgba(205,39,39,.25); }
  .btn-primary:hover{ background:#9b1a1a; }
  .btn-ghost{ background:#fff; color:#373F41; border:1px solid #ddd; }
  .status{ margin-top:14px; padding:10px 14px; border-radius:8px; font-size:13px; display:none; }
  .status.ok{ display:block; background:#e7f7ec; color:#1d6b32; border:1px solid #b7e6c4; }
  .status.err{ display:block; background:#fdecec; color:#9b1a1a; border:1px solid #f3caca; }
  @media(max-width:820px){ .wrap{ grid-template-columns:1fr; } .types{ position:static; } .grid{ grid-template-columns:1fr; } }
</style>
</head>
<body>
<header>
  <img src="/apps/airpak/img/logo.png" alt="Airpak Express">
  <h1>Document Generator</h1>
  <a href="/"><i class="fa fa-arrow-left"></i> Back to site</a>
</header>

<div class="wrap">
  <aside class="types">
    <h3>Document Type</h3>
    <button class="type-btn active" data-type="invoice"><i class="fa fa-file-text-o"></i> Invoice</button>
    <button class="type-btn" data-type="waybill"><i class="fa fa-plane"></i> Air Waybill</button>
    <button class="type-btn" data-type="receipt"><i class="fa fa-money"></i> Payment Receipt</button>
    <button class="type-btn" data-type="label"><i class="fa fa-tag"></i> Shipping Label</button>
  </aside>

  <main class="form">
    <h2 id="formTitle">Invoice</h2>
    <p class="hint">Fill in the details below and generate a branded PDF with the Airpak logo, ready to print, sign or email.</p>

    <div class="grid">
      <div><label>Document Number</label><input id="f-number" placeholder="INV-0001"></div>
      <div><label>Date</label><input id="f-date" type="date"></div>
    </div>

    <fieldset id="fs-from"><legend id="lg-from">Bill From / Sender</legend>
      <div class="grid">
        <div><label>Name</label><input id="f-sender-name" placeholder="ABC Trading Sdn Bhd"></div>
        <div><label>Phone</label><input id="f-sender-phone" placeholder="+60 12-345 6789"></div>
        <div class="grid full"><label>Address</label><textarea id="f-sender-address" placeholder="Street, City, Postcode, State"></textarea></div>
        <div class="grid full"><label>Email</label><input id="f-sender-email" type="email" placeholder="hello@example.com"></div>
      </div>
    </fieldset>

    <fieldset id="fs-to"><legend id="lg-to">Bill To / Recipient</legend>
      <div class="grid">
        <div><label>Name</label><input id="f-rec-name" placeholder="XYZ Logistics"></div>
        <div><label>Phone</label><input id="f-rec-phone" placeholder="+60 12-987 6543"></div>
        <div class="grid full"><label>Address</label><textarea id="f-rec-address"></textarea></div>
        <div class="grid full"><label>Email</label><input id="f-rec-email" type="email"></div>
      </div>
    </fieldset>

    <fieldset id="fs-ship"><legend>Shipment Details</legend>
      <div class="grid">
        <div><label>Service</label>
          <select id="f-service">
            <option>Standard Express</option>
            <option>Same-Day Delivery</option>
            <option>Next-Day Delivery</option>
            <option>International Express</option>
            <option>Document Express</option>
            <option>Freight / Pallet</option>
          </select>
        </div>
        <div><label>Weight (kg)</label><input id="f-weight" placeholder="2.5"></div>
        <div><label>Tracking #</label><input id="f-tracking" placeholder="AP1234567890"></div>
        <div><label>Payment Method</label>
          <select id="f-payment">
            <option>Cash</option><option>Bank Transfer</option><option>FPX / Online Banking</option>
            <option>Credit/Debit Card</option><option>COD (Cash on Delivery)</option>
          </select>
        </div>
      </div>
    </fieldset>

    <fieldset class="items"><legend>Items / Contents</legend>
      <table>
        <thead><tr>
          <th class="col-desc">Description</th><th class="col-num">Qty</th>
          <th class="col-unit">Unit</th><th class="col-num">Price (RM)</th><th class="col-act"></th>
        </tr></thead>
        <tbody id="itemRows"></tbody>
      </table>
      <button type="button" class="add" id="addRow"><i class="fa fa-plus"></i> Add item</button>
    </fieldset>

    <fieldset><legend>Notes</legend>
      <textarea id="f-notes" placeholder="Special handling instructions, terms, etc."></textarea>
    </fieldset>

    <div class="actions">
      <button class="btn btn-primary" id="genBtn"><i class="fa fa-download"></i> Generate &amp; Download PDF</button>
      <button class="btn btn-ghost" id="resetBtn"><i class="fa fa-refresh"></i> Clear form</button>
    </div>
    <div class="status" id="status"></div>
  </main>
</div>

<script>
(function(){
  var currentType='invoice';
  var typeTitles={invoice:'Invoice',waybill:'Air Waybill',receipt:'Payment Receipt',label:'Shipping Label'};
  var typeFromLegend={invoice:'Bill From',waybill:'Shipper',receipt:'Received From',label:'From'};
  var typeToLegend={invoice:'Bill To',waybill:'Consignee',receipt:'Customer (optional)',label:'To'};
  function $(id){return document.getElementById(id);}
  function setType(t){
    currentType=t;
    document.querySelectorAll('.type-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.type===t); });
    $('formTitle').textContent=typeTitles[t];
    $('lg-from').textContent=typeFromLegend[t]+' / Sender';
    $('lg-to').textContent=typeToLegend[t]+' / Recipient';
    $('fs-to').style.display = t==='receipt' ? 'none' : '';
    $('fs-ship').style.display = (t==='waybill'||t==='label') ? '' : (t==='receipt'?'none':'');
  }
  document.querySelectorAll('.type-btn').forEach(function(b){ b.addEventListener('click', function(){ setType(b.dataset.type); }); });
  $('f-date').valueAsDate=new Date();

  function addRow(d,q,u,p){
    var tr=document.createElement('tr');
    tr.innerHTML='<td><input class="i-desc" value="'+(d||'')+'" placeholder="Item description"></td>'+
      '<td><input class="i-qty" type="number" min="0" step="1" value="'+(q||1)+'"></td>'+
      '<td><input class="i-unit" value="'+(u||'pc')+'"></td>'+
      '<td><input class="i-price" type="number" min="0" step="0.01" value="'+(p||0)+'"></td>'+
      '<td class="col-act"><button class="rm" type="button" title="Remove"><i class="fa fa-times"></i></button></td>';
    tr.querySelector('.rm').addEventListener('click', function(){ tr.remove(); });
    $('itemRows').appendChild(tr);
  }
  $('addRow').addEventListener('click', function(){ addRow(); });
  addRow('Express courier service', 1, 'shipment', 15.00);

  function collect(){
    var rows=[].slice.call(document.querySelectorAll('#itemRows tr')).map(function(tr){
      return {
        description: tr.querySelector('.i-desc').value,
        qty: Number(tr.querySelector('.i-qty').value)||0,
        unit: tr.querySelector('.i-unit').value,
        price: Number(tr.querySelector('.i-price').value)||0,
      };
    }).filter(function(r){ return r.description; });
    return {
      type: currentType,
      number: $('f-number').value || (currentType.toUpperCase().slice(0,3)+'-'+Date.now().toString().slice(-6)),
      date: $('f-date').value ? new Date($('f-date').value).toLocaleDateString('en-MY') : new Date().toLocaleDateString('en-MY'),
      sender: { name:$('f-sender-name').value, address:$('f-sender-address').value, phone:$('f-sender-phone').value, email:$('f-sender-email').value },
      recipient: { name:$('f-rec-name').value, address:$('f-rec-address').value, phone:$('f-rec-phone').value, email:$('f-rec-email').value },
      service: $('f-service').value,
      weight: $('f-weight').value,
      trackingNumber: $('f-tracking').value,
      paymentMethod: $('f-payment').value,
      items: rows,
      notes: $('f-notes').value
    };
  }
  function setStatus(msg, ok){
    var s=$('status'); s.className='status '+(ok?'ok':'err'); s.textContent=msg;
  }
  $('genBtn').addEventListener('click', function(){
    var data=collect();
    if(data.type!=='label' && data.type!=='waybill' && data.items.length===0){
      setStatus('Please add at least one item before generating.', false); return;
    }
    setStatus('Generating PDF...', true); $('genBtn').disabled=true;
    fetch('/api/documents/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})
      .then(function(r){ if(!r.ok) return r.json().then(function(e){throw new Error(e.error||'Server error');}); return r.blob(); })
      .then(function(blob){
        var url=URL.createObjectURL(blob); var a=document.createElement('a');
        a.href=url; a.download='airpak-'+data.type+'-'+data.number+'.pdf';
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(function(){ URL.revokeObjectURL(url); }, 500);
        setStatus('Downloaded successfully.', true);
      })
      .catch(function(e){ setStatus(e.message||'Failed to generate.', false); })
      .finally(function(){ $('genBtn').disabled=false; });
  });
  $('resetBtn').addEventListener('click', function(){
    document.querySelectorAll('input,textarea').forEach(function(i){ if(i.type==='date') i.valueAsDate=new Date(); else i.value=''; });
    $('itemRows').innerHTML=''; addRow('Express courier service',1,'shipment',15.00);
    setStatus('', true); $('status').className='status';
  });
})();
</script>
<script src="/apps/airpak/js/ap-lang.js" defer></script>
<script src="/apps/airpak/js/ap-chat.js" defer></script>
</body>
</html>
