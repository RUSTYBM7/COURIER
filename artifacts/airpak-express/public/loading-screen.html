<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airpak Express — Loading</title>
  <link rel="icon" type="image/png" href="/apps/airpak/img/icon-airpak.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ap-red: #CD2727;
      --ap-red-dark: #9b1a1a;
      --ap-ink: #1a1a1a;
      --ap-muted: #6b6b6b;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: var(--ap-ink);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .preloader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 32px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .brand img {
      height: 56px;
      width: auto;
      display: block;
    }

    .brand-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--ap-ink);
      letter-spacing: -0.2px;
    }

    /* Red circular spinner — brand red ring rotating */
    .spinner {
      width: 88px;
      height: 88px;
      position: relative;
    }

    .spinner::before,
    .spinner::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 6px solid transparent;
    }

    .spinner::before {
      border-color: rgba(205, 39, 39, 0.12);
    }

    .spinner::after {
      border-top-color: var(--ap-red);
      border-right-color: var(--ap-red-dark);
      animation: ap-spin 0.9s linear infinite;
      box-shadow: 0 0 24px rgba(205, 39, 39, 0.25);
    }

    @keyframes ap-spin {
      to { transform: rotate(360deg); }
    }

    .status {
      font-size: 14px;
      font-weight: 500;
      color: var(--ap-muted);
      letter-spacing: 0.2px;
    }

    .dots::after {
      content: "";
      display: inline-block;
      width: 1ch;
      text-align: left;
      animation: ap-dots 1.4s steps(4, end) infinite;
    }

    @keyframes ap-dots {
      0%   { content: ""; }
      25%  { content: "."; }
      50%  { content: ".."; }
      75%  { content: "..."; }
      100% { content: ""; }
    }

    @media (prefers-color-scheme: dark) {
      html, body { background: #0e0e0e; color: #f4f4f4; }
      .brand-name { color: #f4f4f4; }
      .status { color: #9a9a9a; }
      .spinner::before { border-color: rgba(205, 39, 39, 0.18); }
    }
    /* ===== MESH GRADIENT BACKGROUND ===== */
    .bg-canvas{position:fixed;top:0;left:0;right:0;bottom:0;z-index:0;overflow:hidden;background:linear-gradient(135deg,#F8F8FC 0%,#EEF0F5 40%,#F5F0F8 70%,#F0F4FA 100%);pointer-events:none;}
    .bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.5;animation:floatBlob 20s ease-in-out infinite;}
    .bg-blob-1{width:600px;height:600px;top:-200px;right:-100px;background:radial-gradient(circle,rgba(205,39,39,.12) 0%,transparent 70%);animation-delay:0s;}
    .bg-blob-2{width:500px;height:500px;bottom:-150px;left:-150px;background:radial-gradient(circle,rgba(0,122,255,.1) 0%,transparent 70%);animation-delay:-7s;}
    .bg-blob-3{width:400px;height:400px;top:40%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(52,199,89,.08) 0%,transparent 70%);animation-delay:-14s;}
    .bg-blob-4{width:350px;height:350px;top:10%;left:20%;background:radial-gradient(circle,rgba(88,86,214,.08) 0%,transparent 70%);animation-delay:-4s;}
    .bg-blob-5{width:450px;height:450px;bottom:20%;right:10%;background:radial-gradient(circle,rgba(255,149,0,.08) 0%,transparent 70%);animation-delay:-10s;}
    @keyframes floatBlob{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(30px,-20px) scale(1.05)}50%{transform:translate(-20px,30px) scale(0.95)}75%{transform:translate(20px,10px) scale(1.02)}}
    .bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,0,0,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.03) 1px,transparent 1px);background-size:40px 40px;}
    body{position:relative;overflow-x:hidden;background:transparent;}
    .preloader{position:relative;z-index:2;}
  </style>
</head>
<body>

<!-- Mesh Gradient Background -->
<div class="bg-canvas" aria-hidden="true">
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="bg-blob bg-blob-3"></div>
  <div class="bg-blob bg-blob-4"></div>
  <div class="bg-blob bg-blob-5"></div>
  <div class="bg-grid"></div>
</div>

  <div class="preloader" role="status" aria-live="polite" aria-label="Signing you in">
    <div class="brand">
      <img src="/apps/airpak/img/icon-airpak.png" alt="Airpak Express" onerror="this.style.display='none'">
      <div class="brand-name">Airpak Express</div>
    </div>

    <div class="spinner" aria-hidden="true"></div>

    <div class="status">Signing you in<span class="dots"></span></div>
  </div>

  <script>
    // Auto-redirect to dashboard after sign-in completes
    setTimeout(function () {
      var next = new URLSearchParams(window.location.search).get('next') || '/dashboard.html';
      window.location.replace(next);
    }, 1800);
  </script>
</body>
</html>
