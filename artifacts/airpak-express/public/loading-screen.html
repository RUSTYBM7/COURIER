<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airpak Express — Loading</title>
  <link rel="icon" type="image/png" href="/apps/airpak/img/icon-airpak.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ap-red: #CD2727;
      --ap-red-dark: #9b1a1a;
      --ap-ink: #1a1a1a;
      --ap-muted: #6b6b6b;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: var(--ap-ink);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .preloader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 32px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .brand img {
      height: 56px;
      width: auto;
      display: block;
    }

    .brand-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--ap-ink);
      letter-spacing: -0.2px;
    }

    /* Red circular spinner — brand red ring rotating */
    .spinner {
      width: 88px;
      height: 88px;
      position: relative;
    }

    .spinner::before,
    .spinner::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 6px solid transparent;
    }

    .spinner::before {
      border-color: rgba(205, 39, 39, 0.12);
    }

    .spinner::after {
      border-top-color: var(--ap-red);
      border-right-color: var(--ap-red-dark);
      animation: ap-spin 0.9s linear infinite;
      box-shadow: 0 0 24px rgba(205, 39, 39, 0.25);
    }

    @keyframes ap-spin {
      to { transform: rotate(360deg); }
    }

    .status {
      font-size: 14px;
      font-weight: 500;
      color: var(--ap-muted);
      letter-spacing: 0.2px;
    }

    .dots::after {
      content: "";
      display: inline-block;
      width: 1ch;
      text-align: left;
      animation: ap-dots 1.4s steps(4, end) infinite;
    }

    @keyframes ap-dots {
      0%   { content: ""; }
      25%  { content: "."; }
      50%  { content: ".."; }
      75%  { content: "..."; }
      100% { content: ""; }
    }

    @media (prefers-color-scheme: dark) {
      html, body { background: #0e0e0e; color: #f4f4f4; }
      .brand-name { color: #f4f4f4; }
      .status { color: #9a9a9a; }
      .spinner::before { border-color: rgba(205, 39, 39, 0.18); }
    }
  </style>
</head>
<body>
  <div class="preloader" role="status" aria-live="polite" aria-label="Signing you in">
    <div class="brand">
      <img src="/apps/airpak/img/icon-airpak.png" alt="Airpak Express" onerror="this.style.display='none'">
      <div class="brand-name">Airpak Express</div>
    </div>

    <div class="spinner" aria-hidden="true"></div>

    <div class="status">Signing you in<span class="dots"></span></div>
  </div>

  <script>
    // Auto-redirect to dashboard after sign-in completes
    setTimeout(function () {
      var next = new URLSearchParams(window.location.search).get('next') || '/dashboard.html';
      window.location.replace(next);
    }, 1800);
  </script>
</body>
</html>
