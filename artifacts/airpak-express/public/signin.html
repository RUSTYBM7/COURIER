<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Airpak Express</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23007AFF'/%3E%3Cpath d='M8 16h16M16 8v16' stroke='white' stroke-width='2.5' stroke-linecap='round'/%3E%3Ccircle cx='16' cy='16' r='6' fill='none' stroke='white' stroke-width='2'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/apple-tokens.css">
  <link rel="stylesheet" href="css/glass-system.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/brand-airpak.css">
  <link rel="stylesheet" href="/apps/airpak/css/ap-lang.css">
  <link rel="stylesheet" href="/apps/airpak/css/ap-chat.css">
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="nav-bar">
    <div class="nav-left">
      <a href="index.html" class="nav-logo">
        <img src="/brand/logo.png" alt="Airpak Express" class="ap-brand-logo" />
        <span class="nav-logo-text">Airpak Express</span>
      </a>
    </div>
    <div class="nav-right">
      <button class="theme-toggle" aria-label="Toggle theme"><i data-lucide="moon"></i></button>
      <a href="signup.html" class="lang-pill"><span class="flag">EN</span> English</a>
    </div>
  </nav>

  <!-- Auth Page -->
  <div class="auth-page">
    <div class="auth-bg-overlay" style="background: linear-gradient(135deg, rgba(0,122,255,0.3) 0%, rgba(88,86,214,0.3) 100%);"></div>

    <!-- Auth Card -->
    <div class="auth-card" style="max-width: 420px;">
      <div class="auth-header">
        <a href="index.html" class="auth-logo">
          <svg width="40" height="40" viewBox="0 0 32 32" fill="none">
            <rect width="32" height="32" rx="6" fill="#007AFF"/>
            <path d="M8 16h16M16 8v16" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="16" cy="16" r="6" fill="none" stroke="white" stroke-width="2"/>
          </svg>
        </a>
        <h1 class="auth-title" data-i18n="auth.signinTitle">Welcome Back</h1>
        <p class="auth-subtitle" data-i18n="auth.signinSubtitle">Sign in to manage your shipments</p>
      </div>

      <form class="auth-form" onsubmit="handleSignin(event)">
        <div class="field">
          <label class="field-label" for="email">Email address</label>
          <input type="email" id="email" class="input" placeholder="you@company.com" required>
        </div>
        <div class="field">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <label class="field-label" for="password">Password</label>
            <a href="reset-password.html" class="btn-ghost" style="font-size: var(--text-sm);">Forgot password?</a>
          </div>
          <input type="password" id="password" class="input" placeholder="••••••••" required>
        </div>
        <div class="checkbox">
          <input type="checkbox" id="remember">
          <label class="label-text" for="remember">Remember me for 30 days</label>
        </div>
        <button type="submit" class="btn-primary btn-block btn-lg"><i data-lucide="arrow-right"></i> Sign In</button>
        <div class="auth-divider"><span>or continue with</span></div>
        <div class="auth-social">
          <button type="button" class="btn-social" onclick="socialLogin('google')">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Google
          </button>
          <button type="button" class="btn-social" onclick="socialLogin('apple')">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
            Apple
          </button>
        </div>
      </form>

      <div class="auth-footer">
        <span>Don't have an account?</span>
        <a href="signup.html">Sign up</a>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    function handleSignin(e) {
      e.preventDefault();
      AIRPAK.Toast.success('Welcome back! Redirecting...');
      setTimeout(() => window.location.href = 'dashboard.html', 1500);
    }
    function socialLogin(provider) {
      AIRPAK.Toast.info(`Signing in with ${provider}...`);
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
  <footer style="background: #1a1a2e; color: rgba(255,255,255,0.5); padding: 20px; text-align: center; font-size: 12px; margin-top: 40px;">
    Unit 7, Wales International Hub, Cardiff Bay, Wales CF10 5AL, United Kingdom &nbsp;|&nbsp; © 2026 Airpak Express. All rights reserved.
  </footer>
  <script src="/apps/airpak/js/ap-lang.js" defer></script>
  <script src="/apps/airpak/js/ap-chat.js" defer></script>
</body>
</html>
