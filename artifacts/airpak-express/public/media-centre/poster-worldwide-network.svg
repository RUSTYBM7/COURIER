  <text x="400" y="990" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">AIRPAK EXPRESS</text>
  <text x="400" y="1020" font-family="Arial,sans-serif" font-size="12" fill="#999" text-anchor="middle">airpak-express.com</text>
