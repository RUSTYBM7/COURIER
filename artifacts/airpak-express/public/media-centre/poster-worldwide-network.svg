<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#f5f5f5"/></linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#CD2727"/><stop offset="100%" stop-color="#9b1a1a"/></linearGradient>
  </defs>
  <rect width="800" height="1100" fill="url(#bg)"/>
  <rect x="40" y="40" width="720" height="1020" rx="20" fill="none" stroke="#CD2727" stroke-width="2"/>
  <!-- Globe -->
  <circle cx="400" cy="420" r="200" fill="none" stroke="#CD2727" stroke-width="3"/>
  <ellipse cx="400" cy="420" rx="200" ry="60" fill="none" stroke="#CD2727" stroke-width="2"/>
  <ellipse cx="400" cy="420" rx="60" ry="200" fill="none" stroke="#CD2727" stroke-width="2"/>
  <path d="M200 420 Q400 280 600 420" fill="none" stroke="#CD2727" stroke-width="2"/>
  <path d="M200 420 Q400 560 600 420" fill="none" stroke="#CD2727" stroke-width="2"/>
  <!-- Flight paths -->
  <path d="M150 300 Q400 100 650 300" stroke="#CD2727" stroke-width="1.5" stroke-dasharray="8,4" fill="none"/>
  <path d="M100 500 Q400 350 700 500" stroke="#CD2727" stroke-width="1.5" stroke-dasharray="8,4" fill="none"/>
  <!-- Location dots -->
  <circle cx="250" cy="350" r="8" fill="#CD2727"/>
  <circle cx="400" cy="280" r="8" fill="#CD2727"/>
  <circle cx="550" cy="400" r="8" fill="#CD2727"/>
  <circle cx="480" cy="520" r="8" fill="#CD2727"/>
  <circle cx="320" cy="480" r="8" fill="#CD2727"/>
  <!-- Title -->
  <rect x="100" y="680" width="600" height="80" rx="12" fill="url(#grad)"/>
  <text x="400" y="738" font-family="Arial,sans-serif" font-size="38" font-weight="bold" fill="white" text-anchor="middle">WORLDWIDE NETWORK</text>
  <text x="400" y="800" font-family="Arial,sans-serif" font-size="72" font-weight="900" fill="#CD2727" text-anchor="middle">220+</text>
  <text x="400" y="860" font-family="Arial,sans-serif" font-size="28" fill="#373F41" text-anchor="middle">COUNTRIES</text>
