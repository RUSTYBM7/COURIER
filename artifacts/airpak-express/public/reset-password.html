<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Airpak Express</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23007AFF'/%3E%3Cpath d='M8 16h16M16 8v16' stroke='white' stroke-width='2.5' stroke-linecap='round'/%3E%3Ccircle cx='16' cy='16' r='6' fill='none' stroke='white' stroke-width='2'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/apple-tokens.css">
  <link rel="stylesheet" href="css/glass-system.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/brand-airpak.css">
  <link rel="stylesheet" href="/apps/airpak/css/ap-lang.css">
  <link rel="stylesheet" href="css/responsive-global.css">
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="nav-bar">
    <div class="nav-left">
      <a href="index.html" class="nav-logo">
        <img src="/brand/logo.png" alt="Airpak Express" class="ap-brand-logo" />
        <span class="nav-logo-text">Airpak Express</span>
      </a>
    </div>
    <div class="nav-right">
      <button class="theme-toggle" aria-label="Toggle theme"><i data-lucide="moon"></i></button>
      <a href="signup.html" class="lang-pill"><span class="flag">EN</span> English</a>
    </div>
  </nav>

  <!-- Reset Password Page -->
  <div class="auth-page">
    <div class="auth-bg-overlay" style="background: linear-gradient(135deg, rgba(0,122,255,0.3) 0%, rgba(88,86,214,0.3) 100%);"></div>

    <!-- Auth Card -->
    <div class="auth-card" style="max-width: 420px;">
      <div class="auth-header">
        <a href="index.html" class="auth-logo">
          <svg width="40" height="40" viewBox="0 0 32 32" fill="none">
            <rect width="32" height="32" rx="6" fill="#007AFF"/>
            <path d="M8 16h16M16 8v16" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="16" cy="16" r="6" fill="none" stroke="white" stroke-width="2"/>
          </svg>
        </a>
        <h1 class="auth-title">Reset Password</h1>
        <p class="auth-subtitle">Enter your email and we will send you a reset link</p>
      </div>

      <form class="auth-form" onsubmit="handleResetPassword(event)">
        <div class="field">
          <label class="field-label" for="email">Email address</label>
          <input type="email" id="email" class="input" placeholder="you@company.com" required>
        </div>

        <button type="submit" class="btn-primary btn-block btn-lg">
          <i data-lucide="send"></i> Send Reset Link
        </button>

        <div class="auth-footer">
          <a href="signin.html"><i data-lucide="arrow-left"></i> Back to Sign In</a>
        </div>
      </form>

      <div class="auth-footer">
        <span>Remember your password?</span>
        <a href="signin.html">Sign in</a>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" style="position: fixed; bottom: 24px; right: 24px; z-index: 9999;"></div>

  <style>
    /* ===== MESH GRADIENT BACKGROUND ===== */
    .bg-canvas{position:fixed;top:0;left:0;right:0;bottom:0;z-index:0;overflow:hidden;background:linear-gradient(135deg,#F8F8FC 0%,#EEF0F5 40%,#F5F0F8 70%,#F0F4FA 100%);}
    .bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.5;animation:floatBlob 20s ease-in-out infinite;}
    .bg-blob-1{width:600px;height:600px;top:-200px;right:-100px;background:radial-gradient(circle,rgba(205,39,39,.12) 0%,transparent 70%);animation-delay:0s;}
    .bg-blob-2{width:500px;height:500px;bottom:-150px;left:-150px;background:radial-gradient(circle,rgba(0,122,255,.1) 0%,transparent 70%);animation-delay:-7s;}
    .bg-blob-3{width:400px;height:400px;top:40%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(52,199,89,.08) 0%,transparent 70%);animation-delay:-14s;}
    .bg-blob-4{width:350px;height:350px;top:10%;left:20%;background:radial-gradient(circle,rgba(88,86,214,.08) 0%,transparent 70%);animation-delay:-4s;}
    .bg-blob-5{width:450px;height:450px;bottom:20%;right:10%;background:radial-gradient(circle,rgba(255,149,0,.08) 0%,transparent 70%);animation-delay:-10s;}
    @keyframes floatBlob{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(30px,-20px) scale(1.05)}50%{transform:translate(-20px,30px) scale(0.95)}75%{transform:translate(20px,10px) scale(1.02)}}
    .bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,0,0,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.03) 1px,transparent 1px);background-size:40px 40px;}
    body{position:relative;overflow-x:hidden;background:transparent;}
    .auth-page{position:relative;z-index:2;}
    .toast {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      font-size: 14px;
      font-weight: 500;
      animation: slideInUp 0.3s ease;
      margin-top: 8px;
    }
    .toast-success {
      border-color: rgba(34,197,94,0.3);
      color: #16a34a;
    }
    .toast-error {
      border-color: rgba(239,68,68,0.3);
      color: #dc2626;
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>

  <script src="js/main.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    function showToast(message, type) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast toast-' + type;
      toast.innerHTML = '<i data-lucide="' + (type === 'success' ? 'check-circle' : 'alert-circle') + '"></i>' + message;
      container.appendChild(toast);
      lucide.createIcons();
      setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, 3000);
    }

    function handleResetPassword(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      showToast('Reset link sent to ' + email + '!', 'success');
    }
  </script>
  <script>lucide.createIcons();</script>
  <footer style="background: #1a1a2e; color: rgba(255,255,255,0.5); padding: 20px; text-align: center; font-size: 12px; margin-top: 40px;">
    Unit 7, Wales International Hub, Cardiff Bay, Wales CF10 5AL, United Kingdom &nbsp;|&nbsp; © 2026 Airpak Express. All rights reserved.
  </footer>
  <script src="/apps/airpak/js/ap-lang.js" defer></script>
<script>
(function(){
  // Platform detection — auto-understands device
  var ua = navigator.userAgent.toLowerCase();
  var os = 'desktop';
  if (/iphone|ipad|ipod/.test(ua)) os = 'ios';
  else if (/android/.test(ua)) os = 'android';
  var w = window.innerWidth;
  if (w < 480) os += '-phone';
  else if (w < 768) os += '-tablet';
  else if (w >= 1024) os += '-desktop';
  var isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  document.body.className = [os, isDark ? 'dark' : 'light', 'loaded'].join(' ');
  // Prevent iOS Safari text inflation
  document.documentElement.style.setProperty('--text-base', '16px');
})();
</script>
</body>
<div class="bg-canvas" aria-hidden="true">
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="bg-blob bg-blob-3"></div>
  <div class="bg-blob bg-blob-4"></div>
  <div class="bg-blob bg-blob-5"></div>
  <div class="bg-grid"></div>
</div>
</html>
